<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notificaciones | Cultivus</title>
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #8bc34a;
            --dark: #2e7d32;
            --light: #f1f8e9;
            --text: #333;
            --bg: #f5f5f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: var(--dark);
            font-size: 28px;
            margin: 0;
        }

        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .notif-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notif-card:hover {
            transform: translateY(-3px);
        }

        .notif-card.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background-color: var(--primary);
        }

        .notif-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .icon-info { background: #e3f2fd; color: #2196f3; }
        .icon-success { background: #e8f5e9; color: #4caf50; }
        .icon-warning { background: #fff3e0; color: #ff9800; }
        .icon-danger { background: #ffebee; color: #f44336; }

        .notif-content {
            flex: 1;
        }

        .notif-title {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 5px;
            color: var(--text);
        }

        .notif-message {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .notif-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #ddd;
        }

        @media (max-width: 600px) {
            .notif-card {
                flex-direction: column;
                gap: 10px;
            }
            .notif-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Incluir Header -->
    <header th:replace="~{fragments/header-comprador :: siteHeader}"></header>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-bell"></i> Mis Notificaciones</h1>
        </div>

        <div class="notif-list">
            <!-- Si no hay notificaciones -->
            <div th:if="${#lists.isEmpty(notificaciones)}" class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <p>No tienes notificaciones en este momento.</p>
                <a th:href="@{/}" class="btn" style="color: var(--primary); text-decoration: none; font-weight: 600;">Volver al Inicio</a>
            </div>

            <!-- Lista de notificaciones -->
            <div th:each="n : ${notificaciones}" class="notif-card" th:classappend="${!n.leida ? 'unread' : ''}">
                <div class="notif-icon" th:classappend="${'icon-' + #strings.toLowerCase(n.tipo)}">
                    <i th:class="${n.tipo == 'INFO' ? 'fas fa-info-circle' : 
                                 n.tipo == 'SUCCESS' ? 'fas fa-check-circle' : 
                                 n.tipo == 'WARNING' ? 'fas fa-exclamation-triangle' : 'fas fa-exclamation-circle'}"></i>
                </div>
                <div class="notif-content">
                    <div class="notif-title" th:text="${n.titulo}">Título de la notificación</div>
                    <div class="notif-message" th:text="${n.mensaje}">Este es el cuerpo del mensaje de la notificación.</div>
                    <div class="notif-meta">
                        <span class="notif-time" th:text="${#temporals.format(n.fecha, 'dd MMM, yyyy HH:mm')}">12 May, 2024</span>
                        <span th:if="${!n.leida}" class="unread-badge" style="background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px;">NUEVO</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/header.js}"></script>
</body>
</html>
