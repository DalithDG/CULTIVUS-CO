<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <header th:fragment="siteHeader" class="admin-header-premium">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <style>
            .admin-header-premium {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                color: white;
                padding: 0.8rem 2rem;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                position: relative;
                z-index: 1000;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .admin-header-premium .header-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                max-width: 1400px;
                margin: 0 auto;
            }
            .admin-header-premium .logo {
                display: flex;
                align-items: center;
                gap: 12px;
                font-weight: 700;
                font-size: 1.4rem;
                letter-spacing: 0.5px;
                background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .admin-header-premium .logo i {
                color: #4facfe;
                -webkit-text-fill-color: initial;
            }
            .admin-header-premium .admin-nav {
                display: flex;
                gap: 1.5rem;
            }
            .admin-header-premium .admin-nav a {
                color: rgba(255, 255, 255, 0.8);
                text-decoration: none;
                font-weight: 500;
                padding: 0.5rem 1rem;
                border-radius: 8px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .admin-header-premium .admin-nav a:hover {
                background: rgba(255, 255, 255, 0.1);
                color: white;
                transform: translateY(-2px);
            }
            .admin-header-premium .admin-user {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }
            .admin-header-premium .user-info {
                display: flex;
                align-items: center;
                gap: 10px;
                background: rgba(255, 255, 255, 0.05);
                padding: 0.5rem 1rem;
                border-radius: 50px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .admin-header-premium .logout-btn {
                background: #ff4b2b;
                color: white;
                padding: 0.5rem 1.2rem;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                font-size: 0.9rem;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .admin-header-premium .logout-btn:hover {
                background: #ff416c;
                box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            }
        </style>

        <div class="header-container">
            <div class="logo" style="display: flex; align-items: center; gap: 10px; background: none; -webkit-text-fill-color: initial;">
                <img th:src="@{/images/LogoCultivus.png}" alt="Cultivus" style="height: 35px; width: auto;">
                <span style="background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CULTIVUS <small style="font-size: 0.7rem; vertical-align: middle;">ADMIN</small></span>
            </div>

            <nav class="admin-nav">
                <a th:href="@{/admin/dashboard}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
                <a th:href="@{/admin/usuarios}">
                    <i class="fa-solid fa-users"></i> Usuarios
                </a>
                <a th:href="@{/admin/productos}">
                    <i class="fa-solid fa-box"></i> Productos
                </a>
                <a th:href="@{/admin/resenas}">
                    <i class="fa-solid fa-star"></i> Reseñas
                </a>
            </nav>

            <div class="admin-user">
                <div class="user-info">
                    <i class="fa-solid fa-circle-user" style="color: #4facfe;"></i>
                    <span th:text="${session.usuarioLogueado != null ? session.usuarioLogueado.nombre : 'Administrador'}">Admin</span>
                </div>
                <a th:href="@{/usuario/logout}" class="logout-btn">
                    <i class="fa-solid fa-sign-out-alt"></i> Salir
                </a>
            </div>
        </div>
    </header>
</body>
</html>
